<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Event 5: De val</title>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a, #2c1810);
      background-image: url('https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/VisitReeks86-DT010220.jpg');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }
    header {
      width: 900px;
      text-align: center;
      margin-bottom: 10px;
      user-select: text;
    }
    header h1.page-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: gold;
      text-shadow:
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
      margin: 0;
      padding-bottom: 10px;
      border-bottom: 3px solid gold;
    }

    /* Banner container with two counters left and right */
    #counters-banner {
      width: 900px;
      margin-bottom: 30px;
      padding: 8px 20px;
      background: black;
      border: 3px solid gold;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 1.2rem;
      color: gold;
      user-select: text;
      box-sizing: border-box;
    }
    
    nav.bannerlink {
      width: 900px;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    nav.bannerlink a {
      color: gold;
      background: black;
      font-weight: bold;
      border: 2px solid gold;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s ease;
      user-select: none;
    }
    nav.bannerlink a:hover:not(.disabled),
    nav.bannerlink a:focus:not(.disabled) {
      background: gold;
      color: black;
      outline: none;
    }
    nav.bannerlink a.disabled {
      pointer-events: none;
      opacity: 0.5;
      cursor: default;
      border-color: gray;
      color: gray;
      user-select: none;
    }

    main.center-links {
      width: 900px;
      display: flex;
      justify-content: center;
      gap: 100px;
      flex-grow: 1;
      align-items: flex-start;
      margin-bottom: 40px;
      user-select: none;
    }
    main.center-links .column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 150px;
    }

    /* Container for each actie + optional lock icon */
    .actie-row {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .actie-button {
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid gold;
      color: gold;
      text-decoration: none;
      background: black;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
      flex-grow: 1;
      text-align: center;
      transition: background-color 0.25s ease;
    }
    .actie-button:hover:not(.disabled):not(.locked) {
      background-color: rgba(255, 215, 0, 0.3);
    }
    .actie-button.disabled {
      pointer-events: none;
      opacity: 0.5;
      cursor: default;
      border-color: gray;
      background: black;
      color: gray;
      user-select: text;
    }

    /* Locked actie buttons appear disabled */
    .actie-button.locked {
      pointer-events: none;
      color: #b22222;
      border-color: red;
      background-color: #330000;
      cursor: default;
      user-select: text;
    }

    /* Small lock button next to locked actie */
    .lock-btn {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      background: black;
      border: none;
      cursor: pointer;
      color: gold;
      font-size: 20px;
      line-height: 20px;
      text-align: center;
      user-select: none;
      padding: 0;
      border-radius: 6px;
      transition: background-color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      outline-offset: 2px;
    }
    .lock-btn:hover:not(.disabled), .lock-btn:focus:not(.disabled) {
      background-color: gold;
      color: black;
      outline: none;
    }
    .lock-btn.disabled {
      pointer-events: none;
      opacity: 0.5;
      cursor: default;
      color: gray;
    }

    footer.bottom-links-disabled {
      width: 900px;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 15px;
      border-top: 3px solid gold;
      user-select: none;
      opacity: 0.5;
      cursor: default;
      color: gray;
      pointer-events: none;
    }
    footer.bottom-links-enabled {
      width: 900px;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 15px;
      border-top: 3px solid gold;
      user-select: none;
      pointer-events: auto;
      opacity: 1;
      cursor: pointer;
      color: gold;
    }
    footer.bottom-links-disabled a {
      font-size: 1rem;
      padding: 8px 14px;
      border-radius: 8px;
      color: gold;
      background: black;
      border: 2px solid gold;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s ease;
      user-select: none;
    }
    footer.bottom-links-enabled a {
      font-size: 1rem;
      padding: 8px 14px;
      border-radius: 8px;
      color: gold;
      background: black;
      border: 2px solid gold;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s ease;
      user-select: none;
    }
    footer.bottom-links a.bookmarked {
      color: gold;
      border-color: gold;
    }

  </style>
</head>
<body>
  <header>
    <h1 class="page-title">Event 5: De val</h1>
  </header>

  <!-- Banner with acties voltooid on left, QR-Counter on right -->
  <div id="counters-banner" aria-live="polite" aria-atomic="true">
    <div id="actie-counter">Acties voltooid: 0/4</div>
    <div id="QR-Counter">0/6</div>
  </div>

  <nav class="bannerlink" aria-label="Hoofdnavigatie">
    <a href="index.html">Main Menu</a>
    <a href="verdachten.html">Verdachten</a>
    <a href="journal.html">Journal</a>
  </nav>

  <main class="center-links" role="main" aria-label="Acties lijst">
    <div class="column" aria-label="Acties 1 t/m 6"></div>
    <div class="column" aria-label="Acties 7 t/m 12 (vergrendeld)"></div>
  </main>

  <footer class="bottom-links-disabled" aria-label="Navigatie naar evenementen en finale">
    <a href="event1.html" class="bottom-links-disabled" tabindex="-1" aria-disabled="true">Event 1</a>
    <a href="event2.html" class="bottom-links-disabled" tabindex="-1" aria-disabled="true">Event 2</a>
    <a href="event3.html" class="bottom-links-disabled" tabindex="-1" aria-disabled="true">Event 3</a>
    <a href="event4.html" class="bottom-links-disabled" tabindex="-1" aria-disabled="true">Event 4</a>
    <a href="finale.html" class="bottom-links-disabled" tabindex="-1" aria-disabled="true">Finale</a>
  </footer>


<script>
  const eventKey = 'event6'; // adjust if needed

  const acties = [
    { id: 'actie1', label: 'Gilde Molenaars', locked: false },
    { id: 'actie2', label: 'Villa Kalandeberg', locked: false },
    { id: 'actie3', label: 'Rabot Sluice', locked: false },
    { id: 'actie4', label: 'Brouwerij Stoepengat', locked: false },
    { id: 'actie5', label: 'Jean Duval', locked: false },
    { id: 'actie6', label: 'Pand Pembroke', locked: false },
    { id: 'actie7', label: 'Graaf van Nevers', locked: true },
    { id: 'actie8', label: 'Huis de Mirabello', locked: true },
    { id: 'actie9', label: 'Penningmeester Deduffer', locked: true },
    { id: 'actie10', label: 'St-Jacob kerk', locked: true },
    { id: 'actie11', label: 'Laken Gilde', locked: true },
    { id: 'actie12', label: 'Dietrich Schwarz', locked: true }
  ];
  
  const passwords = {
    'actie7': ['pass7', 'pass8','pass9','pass10','pass11','pass12'],
    'actie8': ['pass7', 'pass8','pass9','pass10','pass11','pass12'],
    'actie9': ['pass7', 'pass8','pass9','pass10','pass11','pass12'],
    'actie10': ['pass7', 'pass8','pass9','pass10','pass11','pass12'],
    'actie11': ['pass7', 'pass8','pass9','pass10','pass11','pass12'],
    'actie12': ['pass7', 'pass8','pass9','pass10','pass11','pass12']
  };

  const cluesByActie = {
    'actie1': 'Dringende oproep bijeenkomst wever en molenaar gildes.',
    'actie2': 'Weelderige verbouwingen bij Jacob van Artevelde.',
    'actie3': 'Schrijven van Broeder Johannes aan lollards over "teologische" bondgenoten.',
    'actie4': 'Afpersing Brouwerij door Handlanger Lodewijk Manskint',
    'actie5': 'Verzameling messen bij Jean Duval.',
    'actie6': 'Doos brieven van Elisabeth de Merseman aan Earl Pembroke.',
    'actie7': 'Operateksten gestuurd van de Graaf van Nevers aan Lievens Quadquaet',
    'actie8': 'Spullen van Lodewijk Manskint bij officieel Mirabello.',
    'actie9': 'Leningen van de Stad Gent aan Edward III.',
    'actie10': 'Brieven omtrent de aankomende excommunicatie van Artevelde.',
    'actie11': 'Faillietverklaring Lakenonderneming Artevelde.',
    'actie12': 'Verslagen Beatrijs Penninck aan Ambassadeur Dietrich Schwarz.',
  };

  const column1 = document.querySelector('main.center-links .column:nth-child(1)');
  const column2 = document.querySelector('main.center-links .column:nth-child(2)');
  const actieCounter = document.getElementById('actie-counter');
  const qrCounter = document.getElementById('QR-Counter');
  const bottomLinks = document.querySelector('footer');
  const bottomLinkButtons = bottomLinks.querySelectorAll('a');

  // Get saved acties from localStorage
  const getActieList = () => {
    try {
      return JSON.parse(localStorage.getItem(`actieList_${eventKey}`)) || [];
    } catch {
      return [];
    }
  };

  const saveActieList = (list) => {
    localStorage.setItem(`actieList_${eventKey}`, JSON.stringify(list));
  };

  // Render acties buttons in 2 columns, respect locked state and completed state
  function renderActies() {
    column1.innerHTML = '';
    column2.innerHTML = '';
    const actieList = getActieList();

    acties.forEach((actie, index) => {
      const row = document.createElement('div');
      row.className = 'actie-row';

      const btn = document.createElement('a');
      btn.className = 'actie-button';
      btn.textContent = actie.label;
      btn.href = '#';
      btn.dataset.actie = actie.id;

      if (actie.locked) {
        btn.classList.add('locked');
      } else if (actieList.includes(actie.id)) {
        btn.classList.add('disabled');
      }

      row.appendChild(btn);

        if (actie.locked) {
    // Determine if locked actie should be enabled based on currentCount
    const currentCount = parseInt(localStorage.getItem(`currentCount_${eventKey}`), 10) || 0;
    const lockedIndex = index - 6; // Because locked acties start at index 6

    const isUnlocked = lockedIndex < currentCount;

    if (isUnlocked) {
      // Unlock actie button
      btn.classList.remove('locked');
      if (getActieList().includes(actie.id)) {
        btn.classList.add('disabled');
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.5';
      }
    } else {
      btn.classList.add('locked');
      btn.classList.remove('disabled');

      // Lock button logic
      const lockBtn = document.createElement('button');
      lockBtn.className = 'lock-btn';
      lockBtn.title = `Unlock ${actie.label} with password`;
      lockBtn.innerHTML = '🔒';

      lockBtn.addEventListener('click', () => {
        const pwd = prompt(`Enter the password to unlock ${actie.label}:`);
        if (passwords[actie.id] && passwords[actie.id].includes(pwd)) {
          alert(`${actie.label} unlocked!`);
          let currentCount = parseInt(localStorage.getItem(`currentCount_${eventKey}`), 10) || 0;
          if (lockedIndex === currentCount) {
            currentCount++;
            localStorage.setItem(`currentCount_${eventKey}`, currentCount.toString());
          }
          renderActies();
          updateCounters();
        } else {
          alert('Incorrect password.');
        }
      });

      row.appendChild(lockBtn);
    }
  }
      // Append rows into 2 columns evenly
      if (index < Math.ceil(acties.length / 2)) {
        column1.appendChild(row);
      } else {
        column2.appendChild(row);
      }
    });

    attachActieClickListeners();
    updateCounters();
  }

  // Simple centered popup for clues
function showPopup(text) {
  let popup = document.getElementById('simple-popup');
  if (!popup) {
    popup = document.createElement('div');
    popup.id = 'simple-popup';
    popup.style = `
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #666;
      color: white;
      padding: 20px;
      border-radius: 10px;
      border: 3px solid black; /* solid black border */
      z-index: 10000;
      max-width: 320px;
      box-shadow: 0 0 10px black;
      user-select: text;
      text-align: center;
    `;

    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✖';
    closeBtn.style = `
      position: absolute;
      top: 5px; right: 8px;
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    `;
    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    popup.appendChild(closeBtn);

    const title = document.createElement('h2');
    title.textContent = 'Aanwijzing:';
    title.style = `
      margin: 0 0 12px 0;
      font-weight: bold;
      font-size: 1.3rem;
      color: gold;
      user-select: text;
    `;
    popup.appendChild(title);

    const content = document.createElement('div');
    content.id = 'popup-content';
    content.style = `user-select: text;`;
    popup.appendChild(content);

    document.body.appendChild(popup);
  }

  popup.querySelector('#popup-content').textContent = text;
  popup.style.display = 'block';
  popup.focus();
}

function updateCounters() {
  const currentCount = parseInt(localStorage.getItem(`currentCount_${eventKey}`), 10) || 0;
  const actieList = getActieList();
  const actiesDone = Math.min(actieList.length, 4);
  actieCounter.textContent = `Acties voltooid: ${actiesDone}/4`;
  qrCounter.textContent = `${currentCount}/6`;

  if (actiesDone >= 4) {
    bottomLinks.classList.remove('bottom-links-disabled');
    bottomLinks.classList.add('bottom-links-enabled');
    bottomLinkButtons.forEach(link => {
      link.classList.remove('disabled');
      link.removeAttribute('aria-disabled');
      link.removeAttribute('tabindex');
    });
  } else {
    bottomLinks.classList.remove('bottom-links-enabled');
    bottomLinks.classList.add('bottom-links-disabled');
    bottomLinkButtons.forEach(link => {
      link.classList.add('disabled');
      link.setAttribute('aria-disabled', 'true');
      link.setAttribute('tabindex', '-1');
    });
  }
}

  // Attach click listeners to unlocked and enabled actie buttons
  function attachActieClickListeners() {
    document.querySelectorAll('a.actie-button:not(.locked):not(.disabled)').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        const actie = btn.dataset.actie;
        if (!actie) return;

        let actieList = getActieList();
        if (!actieList.includes(actie)) {
          actieList.push(actie);
          saveActieList(actieList);
          showPopup(cluesByActie[actie] || 'Geen aanwijzing beschikbaar.');
          btn.classList.add('disabled');
          btn.style.pointerEvents = 'none';
          btn.style.opacity = '0.5';
          updateCounters();
        } else {
          showPopup('Deze actie is al bekeken.');
        }
      };
    });
  }

  // Initial render
  renderActies();
</script>

</body>
</html>
