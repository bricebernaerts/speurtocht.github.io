<!DOCTYPE html>
<html>
<head>
  <title>Gent 1345 - Murder Mystery</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('https://uploads.onecompiler.io/44fwt7xkt/44g25av65/fran%C3%A7ois-jean-louis-boulanger-stadtansicht-in-gent.webp');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial, sans-serif;
      text-shadow:
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
    }

    h1.title {
      font-size: 60px;
      margin-bottom: 20px;
      text-decoration: underline;   
    }

    button#start-button, button#skip-button {
      font-size: 24px;
      padding: 10px 30px;
      border-radius: 8px;
      border: 3px solid gold;
      background: rgba(0, 0, 0, 0.7);
      color: gold;
      cursor: pointer;
      transition: background 0.3s ease;
      margin: 10px 5px 0;
    }

    button#start-button:hover, button#skip-button:hover {
      background: rgba(255, 215, 0, 0.9);
      color: black;
    }

    #animation-container {
      display: none;
      position: relative;
      width: 570px;
      height: 450px;
      border: 3px solid gold;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.6);
      margin-top: 30px;
      overflow: hidden;
      box-sizing: border-box;
    }

    #animation-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 7px;
      user-select: none;
      pointer-events: none;
      background: black;
    }

    #narration {
      margin-top: 30px;
      max-width: 600px;
      font-size: 20px;
      line-height: 1.4;
      display: none;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px 20px;
      border-radius: 8px;
      cursor: default;
      user-select: none;
      text-align: center;
    }

    #continue-button {
      margin-top: 20px;
      font-size: 20px;
      padding: 8px 25px;
      border-radius: 6px;
      border: 2px solid gold;
      background: rgba(0, 0, 0, 0.7);
      color: gold;
      cursor: pointer;
      display: none;
      transition: background 0.3s ease;
    }

    #continue-button:hover {
      background: gold;
      color: black;
    }

    /* Container for start and skip buttons side-by-side */
    #button-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1 class="title">Gent 1345</h1>
  <div id="button-container">
    <button id="start-button">Start</button>
    <button id="skip-button" aria-label="Skip intro and go to Event 1">Skip</button>
  </div>

  <div id="animation-container">
    <video id="animation-video" preload="auto" muted playsinline>
      <source src="https://raw.githubusercontent.com/bricebernaerts/speurtocht.github.io/main/De val.mp4" type="video/webm" />
    </video>
  </div>

  <div id="narration"></div>
  <button id="continue-button">Doorgaan</button>

  <script>
    const startButton = document.getElementById('start-button');
    const skipButton = document.getElementById('skip-button');
    const animationContainer = document.getElementById('animation-container');
    const animationVideo = document.getElementById('animation-video');
    const narration = document.getElementById('narration');
    const continueButton = document.getElementById('continue-button');

    // The four narration texts
    const narrations = [
      "De stad is nog niet bekomen van het bloedvergieten. Op de Vrijdagmarkt, tijdens ‘Quaden Maendach’ werden honderden volders afgeslacht door de wevers. Sindsdien staan de gilden op scherp en kan één vonk de stad opnieuw in vuur zetten.",
      "Tegelijk woedt buiten de stadsgrenzen de Honderdjarige Oorlog. Vlaanderen balanceert behoedzaam tussen grootmachten, vastberaden om onafhankelijk te worden.",
      "Te midden van deze onrust probeert Jacob van Artevelde de stad bijeen te houden. Doch werd vanmiddag Willem De Merseman, zijn vertrouweling, levenloos aangetroffen. Hij viel uit het raam van zijn eigen kantoor. Wat eerst een ongeluk leek, is onmiskenbaar moord daar een dolkletsel in zijn rug werd ontdekt.",
      "Zes verdachten waren aanwezig in het huis van Willem tijdens de feiten: ontmasker spoedig de dader voordat er meer slachtoffers vallen!"
    ];

    let narrationIndex = 0;

    startButton.addEventListener('click', () => {
      startButton.style.display = 'none';
      skipButton.style.display = 'none';
      animationContainer.style.display = 'block';
      animationVideo.currentTime = 0;
      animationVideo.play();

      animationVideo.onended = () => {
        animationContainer.style.display = 'none';
        narration.style.display = 'block';
        narration.textContent = narrations[narrationIndex];
        continueButton.style.display = 'inline-block';
      };
    });

    skipButton.addEventListener('click', () => {
      window.location.href = 'event1.html';
    });

    continueButton.addEventListener('click', () => {
      narrationIndex++;

      if (narrationIndex < narrations.length) {
        narration.textContent = narrations[narrationIndex];
      } else {
        window.location.href = 'inleiding.html';
      }
    });
  </script>
</body>
</html>
