<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Journal - Gent 1345</title>
  <style>
    /* Base resets and font similar to inleiding.html */
    body, html {
      margin: 0; padding: 0;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a, #2c1810);
      font-family: 'Cormorant Garamond', serif;
      color: #eee;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    body.journalbackground {
      background-image: url('https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/speur3.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: contain;
    }

    #main-container {
      width: 900px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0 3rem 0;
    }

    h1.page-title {
      font-size: 48px;
      text-align: center;
      font-weight: 700;
      margin: 0;
      padding-bottom: 0.5rem;
      color: gold;
      user-select: text;
      text-decoration: underline;
      text-shadow: 
        -2px -2px 0 black,
         2px -2px 0 black,
        -2px  2px 0 black,
         2px  2px 0 black;
    }

    /* Navigation banner like inleiding */
    .bannerlink {
      display: flex;
      justify-content: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 0;
      border-radius: 8px;
      user-select: none;
    }

    .bannerlink a {
      color: gold;
      font-weight: 600;
      border: 2px solid gold;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.2);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      white-space: nowrap;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .bannerlink a:hover, .bannerlink a:focus {
      background: gold;
      color: black;
      outline: none;
    }

    /* Container for all event logs in grid layout */
    #journal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
      user-select: text;
    }

    /* Per-event container box */
    .event-log {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 15px 20px;
      color: white;
      font-size: 1rem;
      box-shadow: inset 0 0 15px 2px #cca300;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      user-select: text;
      box-sizing: border-box;
    }

    /* Event title inside each box */
    .event-log h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: gold;
      font-size: 1.3rem;
      text-align: center;
      user-select: text;
    }

    /* Clue text paragraphs */
    .event-log p {
      margin: 0.5rem 0;
      line-height: 1.4;
    }

    /* Clear Journal button styled like inleiding buttons */
    #clear-journal {
      display: block;
      margin: 20px auto 0 auto;
      padding: 10px 30px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      border-radius: 10px;
      border: 3px solid gold;
      background: rgba(255, 255, 255, 0.2);
      color: gold;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
      user-select: none;
      text-align: center;
      max-width: 200px;
    }

    #clear-journal:hover, #clear-journal:focus {
      background: gold;
      color: black;
      outline: none;
    }

    /* Bottom links container */
    .bottom-links {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      gap: 20px;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 0;
      border-radius: 8px;
    }

    .bottom-links a {
      font-size: 1.1rem;
      padding: 8px 14px;
      border-radius: 8px;
      color: gold;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid gold;
      text-decoration: none;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      transition: background 0.3s ease, color 0.3s ease;
      white-space: nowrap;
    }

    .bottom-links a.bookmarked {
      color: gold;
      border-color: gold;
    }

    .bottom-links a:hover, .bottom-links a:focus {
      background: gold;
      color: black;
      outline: none;
    }
  </style>
</head>
<body class="journalbackground">
  <main id="main-container">
    <h1 class="page-title">Journal</h1>

    <div id="QR-Counter"></div>

    <nav class="bannerlink" aria-label="Hoofdnavigatie">
      <a href="index.html">Main Menu</a>
      <a href="verdachten.html">Verdachten</a>
      <a href="journal.html">Journal</a>
    </nav>

    <section id="journal-grid" aria-label="Journal per event">
      <!-- Event logs appended here dynamically -->
    </section>

    <button id="clear-journal" aria-label="Clear Journal">
      Clear Journal
    </button>

    <footer class="bottom-links" aria-label="Navigatie naar evenementen">
      <a href="event1.html" class="bookmarked">Event 1</a>
      <a href="event2.html" class="bookmarked">Event 2</a>
      <a href="event3.html" class="bookmarked">Event 3</a>
      <a href="event4.html" class="bookmarked">Event 4</a>
      <a href="event5.html" class="bookmarked">Event 5</a>
      <a href="finale.html" class="bookmarked">Finale</a>
    </footer>
  </main>

  <script>
    // Map actie IDs to clue text shown
  const actieTextsByEvent = {
  event1: {
    'actie1': 'Willem Merseman heeft een dolkletsel.',
    'actie2': 'Willem en Elisabeth de Merseman hebben vaak ruzie.',
    'actie3': 'Willem en Geeraert Denys komen niet overeen.',
    'actie4': 'Broeder Johannes komt vaak Willem bezoeken.',
    'actie5': 'Lodewijk Manskint is een misdadiger maar wordt zelden of niet bestraft.',
    // ... add clues for event1 actie3 to actie12
  },
  event2: {
    'actie1': 'Naaktschilderij van Willem de Merseman in het atelier.',
    'actie2': 'Aanboden aan Willem de Merseman van de volder gildemeester.',
    'actie3': 'Roddels van ontrouw van Elisabeth de Merseman.',
    'actie4': 'Een kritische tekst van Broeder Johannes over de celibaatsplicht.',
    'actie5': 'Ongeopende verzoeken tot schuldkwijtschelding van Lievens Quadquaet.',
    'actie6': 'Sierraden van Lokewijk Manskint in de gastkamer.',
    'actie7': 'Event1 - Actie 2 clue text',
    'actie8': 'Event1 - Actie 2 clue text',
    'actie9': 'Een getand steekmes.',
    'actie10': 'Tuinscharen.',
    'actie11': 'Een lange dolk.',
    'actie12': 'Een scherpe keukenmes.',
    // ... add clues for event2 actie3 to actie12
  },
  event3: {
    'actie1': 'Event1 - Actie 1 clue text',
    'actie2': 'Event1 - Actie 2 clue text',
    'actie3': 'Event1 - Actie 2 clue text',
    'actie4': 'Event1 - Actie 2 clue text',
    'actie5': 'Event1 - Actie 2 clue text',
    'actie6': 'Event1 - Actie 2 clue text',
    'actie7': 'Event1 - Actie 2 clue text',
    'actie8': 'Event1 - Actie 2 clue text',
    'actie9': 'Event1 - Actie 2 clue text',
    'actie10': 'Event1 - Actie 2 clue text',
    'actie11': 'Event1 - Actie 2 clue text',
    'actie12': 'Event1 - Actie 2 clue text',
    // continue for each event & actie
  },
  event4: {
    'actie1': 'Oproep leden wevergilde om zich te bewapenen.',
    'actie2': 'Geruchten dat Beatrijs zich ineens vaak kom biechten.',
    'actie3': 'Dronken beweringen van Lievens Quadquaet dat zijn geldproblemen opgelost zijn.',
    'actie4': 'Vergaderingnotities van Deslager met Edward III in London.',
    'actie5': 'Bevestiging van seksuele diensten aan Broeder Johannes.',
    'actie6': 'Klacht van Elisabeth de Merseman tegen Lodewijk Manskint.',
    'actie7': 'Aanzienlijke bestellingen van Engelse handelaren bij de voldergilde.',
    'actie8': 'Veroordeling tot de dood van Engel Penninck.',
    'actie9': 'Munten vanuit Parijs bij Lievens Quadquaet.',
    'actie10': 'Gratieverlening voor misdrijven van Lodewijk Manskint.',
    'actie11': 'Vulgaire anti-kerk satire geschreven door Broeder Johannes, waarin beatrijs actrice is.',
    'actie12': 'Overplaatsing van Petrus Boomans naar Willem de Merseman.',
    // continue for each event & actie
  },
  event5: {
    'actie1': 'Event1 - Actie 1 clue text',
    'actie2': 'Event1 - Actie 2 clue text',
    'actie3': 'Event1 - Actie 2 clue text',
    'actie4': 'Event1 - Actie 2 clue text',
    'actie5': 'Event1 - Actie 2 clue text',
    'actie6': 'Event1 - Actie 2 clue text',
    'actie7': 'Event1 - Actie 2 clue text',
    'actie8': 'Event1 - Actie 2 clue text',
    'actie9': 'Event1 - Actie 2 clue text',
    'actie10': 'Event1 - Actie 2 clue text',
    'actie11': 'Event1 - Actie 2 clue text',
    'actie12': 'Event1 - Actie 2 clue text',
    // continue for each event & actie
  },
  event6: {
    'actie1': 'Dringende oproep bijeenkomst wever en molenaar gildes.',
    'actie2': 'Weelderige verbouwingen bij Jacob van Artevelde.',
    'actie3': 'Schrijven van Broeder Johannes aan lollards over "teologische" bondgenoten.',
    'actie4': 'Afpersing Brouwerij door Handlanger Lodewijk Manskint',
    'actie5': 'Verzameling messen bij Jean Duval.',
    'actie6': 'Doos brieven van Elisabeth de Merseman aan Earl Pembroke.',
    'actie7': 'Operateksten gestuurd van de Graaf van Nevers aan Lievens Quadquaet',
    'actie8': 'Spullen van Lodewijk Manskint bij officieel Mirabello.',
    'actie9': 'Leningen van de Stad Gent aan Edward III.',
    'actie10': 'Brieven omtrent de aankomende excommunicatie van Artevelde.',
    'actie11': 'Faillietverklaring Lakenonderneming Artevelde.',
    'actie12': 'Verslagen Beatrijs Penninck aan Ambassadeur Dietrich Schwarz.',
    // continue for each event & actie
  },
  // Add all events needed
  };

    const events = [
      { key: 'event1', title: 'Inleiding' },
      { key: 'event2', title: 'Event 1' },
      { key: 'event3', title: 'Event 2' },
      { key: 'event4', title: 'Event 3' },
      { key: 'event5', title: 'Event 4' },
      { key: 'event6', title: 'Event 5' }
    ];

    const grid = document.getElementById('journal-grid');

    // For each event, load its actieList and display clues
    events.forEach(event => {
      let actieList = [];
      try {
        actieList = JSON.parse(localStorage.getItem(`actieList_${event.key}`)) || [];
      } catch(e) {
        actieList = [];
      }

      // Create event container box
      const box = document.createElement('article');
      box.className = 'event-log';
      box.setAttribute('tabindex', '0');
      box.setAttribute('aria-label', `Journal log for ${event.title}`);

      // Event title
      const heading = document.createElement('h2');
      heading.textContent = event.title;
      box.appendChild(heading);

      if (actieList.length === 0) {
        const p = document.createElement('p');
        p.textContent = '(Nog geen aanwijzingen)';
        box.appendChild(p);
      } else {
        actieList.forEach(actie => {
          const p = document.createElement('p');
          p.textContent = (actieTextsByEvent[event.key] && actieTextsByEvent[event.key][actie]) || '(Unknown clue)';
          box.appendChild(p);
        });
      }

      grid.appendChild(box);
    });

    // Clear Journal button clears all event progress and clears grid content
    document.getElementById('clear-journal').addEventListener('click', () => {
      events.forEach(e => {
        localStorage.removeItem(`actieList_${e.key}`);
        localStorage.removeItem(`currentCount_${e.key}`);
      });
      grid.innerHTML = '';
      // Rebuild empty logs with no clues message
      events.forEach(event => {
        const box = document.createElement('article');
        box.className = 'event-log';
        box.setAttribute('tabindex', '0');
        box.setAttribute('aria-label', `Journal log for ${event.title}`);

        const heading = document.createElement('h2');
        heading.textContent = event.title;
        box.appendChild(heading);

        const p = document.createElement('p');
        p.textContent = '(Nog geen aanwijzingen)';
        box.appendChild(p);

        grid.appendChild(box);
      });
    });
  </script>
</body>
</html>
