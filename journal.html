<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Journal - Gent 1345</title>
  <style>
    /* Base resets and font similar to inleiding.html */
    body, html {
      margin: 0; padding: 0;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a, #2c1810);
      font-family: 'Cormorant Garamond', serif;
      color: #eee;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    body.journalbackground {
      background-image: url('https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/speur3.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: contain;
    }

    #main-container {
      width: 900px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0 3rem 0;
    }

    h1.page-title {
      font-size: 48px;
      text-align: center;
      font-weight: 700;
      margin: 0;
      padding-bottom: 0.5rem;
      color: gold;
      user-select: text;
      text-decoration: underline;
      text-shadow: 
        -2px -2px 0 black,
         2px -2px 0 black,
        -2px  2px 0 black,
         2px  2px 0 black;
    }

    /* Navigation banner like inleiding */
    .bannerlink {
      display: flex;
      justify-content: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 0;
      border-radius: 8px;
      user-select: none;
    }

    .bannerlink a {
      color: gold;
      font-weight: 600;
      border: 2px solid gold;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.2);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      white-space: nowrap;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .bannerlink a:hover, .bannerlink a:focus {
      background: gold;
      color: black;
      outline: none;
    }

    /* Container for all event logs in grid layout */
    #journal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
      user-select: text;
    }

    /* Per-event container box */
    .event-log {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 15px 20px;
      color: white;
      font-size: 1rem;
      box-shadow: inset 0 0 15px 2px #cca300;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      user-select: text;
      box-sizing: border-box;
    }

    /* Event title inside each box */
    .event-log h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: gold;
      font-size: 1.3rem;
      text-align: center;
      user-select: text;
    }

    /* Clue text paragraphs */
    .event-log p {
      margin: 0.3rem 0;
      line-height: 1.4;
    }

    /* Clear Journal button styled like inleiding buttons */
    #clear-journal {
      display: block;
      margin: 20px auto 0 auto;
      padding: 10px 30px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      border-radius: 10px;
      border: 3px solid gold;
      background: rgba(255, 255, 255, 0.2);
      color: gold;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
      user-select: none;
      text-align: center;
      max-width: 200px;
    }

    #clear-journal:hover, #clear-journal:focus {
      background: gold;
      color: black;
      outline: none;
    }

    /* Bottom links container */
    .bottom-links {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      gap: 20px;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 0;
      border-radius: 8px;
    }

    .bottom-links a {
      font-size: 1.1rem;
      padding: 8px 14px;
      border-radius: 8px;
      color: gold;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid gold;
      text-decoration: none;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      transition: background 0.3s ease, color 0.3s ease;
      white-space: nowrap;
    }

    .bottom-links a.bookmarked {
      color: gold;
      border-color: gold;
    }

    .bottom-links a:hover, .bottom-links a:focus {
      background: gold;
      color: black;
      outline: none;
    }
  </style>
</head>
<body class="journalbackground">
  <main id="main-container">
    <h1 class="page-title">Journal</h1>

    <div id="QR-Counter"></div>

    <nav class="bannerlink" aria-label="Hoofdnavigatie">
      <a href="index.html">Main Menu</a>
      <a href="verdachten.html">Verdachten</a>
      <a href="journal.html">Journal</a>
    </nav>

    <section id="journal-grid" aria-label="Journal per event">
      <!-- Event logs appended here dynamically -->
    </section>

    <button id="clear-journal" aria-label="Clear Journal">
      Clear Journal
    </button>

    <footer class="bottom-links" aria-label="Navigatie naar evenementen">
      <a href="event1.html" class="bookmarked">Event 1</a>
      <a href="event2.html" class="bookmarked">Event 2</a>
      <a href="event3.html" class="bookmarked">Event 3</a>
      <a href="event4.html" class="bookmarked">Event 4</a>
      <a href="event5.html" class="bookmarked">Event 5</a>
      <a href="event6.html" class="bookmarked">Event 6</a>
    </footer>
  </main>

  <script>
    // Map actie IDs to clue text shown
    const actieTexts = {
      'actie1': 'Actie 1 produces this clue',
      'actie2': 'Details or text for Actie 2.',
      'actie3': 'Details or text for Actie 3.',
      'actie4': 'Details or text for Actie 4.',
      'actie5': 'Details or text for Actie 5.',
      'actie6': 'Details or text for Actie 6.',
      'actie7': 'Details or text for Actie 7.',
      'actie8': 'Details or text for Actie 8.',
      'actie9': 'Details or text for Actie 9.',
      'actie10': 'Details or text for Actie 10.',
      'actie11': 'Details or text for Actie 11.',
      'actie12': 'Details or text for Actie 12.'
    };

    const events = [
      { key: 'event1', title: 'Event 1' },
      { key: 'event2', title: 'Event 2' },
      { key: 'event3', title: 'Event 3' },
      { key: 'event4', title: 'Event 4' },
      { key: 'event5', title: 'Event 5' },
      { key: 'event6', title: 'Event 6' }
    ];

    const grid = document.getElementById('journal-grid');

    // For each event, load its actieList and display clues
    events.forEach(event => {
      let actieList = [];
      try {
        actieList = JSON.parse(localStorage.getItem(`actieList_${event.key}`)) || [];
      } catch(e) {
        actieList = [];
      }

      // Create event container box
      const box = document.createElement('article');
      box.className = 'event-log';
      box.setAttribute('tabindex', '0');
      box.setAttribute('aria-label', `Journal log for ${event.title}`);

      // Event title
      const heading = document.createElement('h2');
      heading.textContent = event.title;
      box.appendChild(heading);

      if (actieList.length === 0) {
        const p = document.createElement('p');
        p.textContent = '(No clues found yet)';
        box.appendChild(p);
      } else {
        actieList.forEach(actie => {
          const p = document.createElement('p');
          p.textContent = actieTexts[actie] || '(Unknown clue)';
          box.appendChild(p);
        });
      }

      grid.appendChild(box);
    });

    // Clear Journal button clears all event progress and clears grid content
    document.getElementById('clear-journal').addEventListener('click', () => {
      events.forEach(e => {
        localStorage.removeItem(`actieList_${e.key}`);
        localStorage.removeItem(`currentCount_${e.key}`);
      });
      grid.innerHTML = '';
      // Rebuild empty logs with no clues message
      events.forEach(event => {
        const box = document.createElement('article');
        box.className = 'event-log';
        box.setAttribute('tabindex', '0');
        box.setAttribute('aria-label', `Journal log for ${event.title}`);

        const heading = document.createElement('h2');
        heading.textContent = event.title;
        box.appendChild(heading);

        const p = document.createElement('p');
        p.textContent = '(No clues found yet)';
        box.appendChild(p);

        grid.appendChild(box);
      });
    });
  </script>
</body>
</html>
