<!DOCTYPE html>
<html>
<head>
  <title>Suspects Overview</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a, #2c1810);
      font-family: Arial, sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1.page-title {
      margin-bottom: 30px;
      font-size: 48px;
      text-shadow:
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
    }

    .suspects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .suspect {
      cursor: pointer;
      border: 3px solid gold;
      border-radius: 12px;
      padding: 10px;
      background: rgba(50, 50, 50, 0.8);
      transition: transform 0.2s ease;
      user-select: none;
    }

    .suspect:hover {
      transform: scale(1.05);
      border-color: lightgoldenrodyellow;
    }

    .mugshot {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 0 12px 2px gold;
      background: black;
    }

    /* Popup modal styles */
    #info-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      max-width: 600px;
      width: 90%;
      max-height: 400px;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      padding: 20px 30px 20px 20px;
      border-radius: 12px;
      border: 3px solid gold;
      box-shadow: 0 0 20px 4px #ffcc33;
      color: white;
      overflow-y: auto;
      z-index: 10000;
      box-sizing: border-box;
      user-select: text;
    }

    #info-popup h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.8rem;
      color: gold;
      user-select: text;
    }

    #info-popup ul {
      padding-left: 20px;
      margin: 0 0 10px 0;
      text-align: left;
    }

    #info-popup ul li {
      margin-bottom: 0.5rem;
    }

    /* Close button in top right corner */
    #close-popup {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 28px;
      font-weight: bold;
      color: gold;
      cursor: pointer;
      user-select: none;
      padding: 0 6px;
      line-height: 1;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }
    #close-popup:hover, #close-popup:focus {
      background-color: gold;
      color: black;
      outline: none;
    }

    .bannerlink {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .bannerlink a {
      color: gold;
      font-weight: bold;
      border: 2px solid gold;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .bannerlink a:hover {
      background: gold;
      color: black;
    }
  </style>
</head>
<body>
  <h1 class="page-title">Verdachten</h1>
  <div class="bannerlink">
    <a href="index.html">Main Menu</a>
    <a href="journal.html">Journal</a>
    <a href="event1.html">Events</a>
  </div>

  <div class="suspects-grid">
    <div class="suspect" data-suspect="suspect1" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas11.png" alt="Suspect 1 Mugshot" class="mugshot" />
      <strong>Jan de Wever</strong>
    </div>
    <div class="suspect" data-suspect="suspect2" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas15.png" alt="Suspect 2 Mugshot" class="mugshot" />
      <strong>Beatrijs Penninck</strong>
    </div>
    <div class="suspect" data-suspect="suspect3" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas6.png" alt="Suspect 3 Mugshot" class="mugshot" />
      <strong>Lodewijk Manskint</strong>
    </div>
    <div class="suspect" data-suspect="suspect4" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas5.png" alt="Suspect 4 Mugshot" class="mugshot" />
      <strong>Lieven Quadquaet</strong>
    </div>
    <div class="suspect" data-suspect="suspect5" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/ja.png" alt="Suspect 5 Mugshot" class="mugshot" />
      <strong>Broeder Johannes</strong>
    </div>
    <div class="suspect" data-suspect="suspect6" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas14.png" alt="Suspect 6 Mugshot" class="mugshot" />
      <strong>Elisabeth de Merseman</strong>
    </div>
  </div>

  <!-- Popup box -->
  <div id="info-popup" role="dialog" aria-modal="true" aria-labelledby="info-title">
    <button id="close-popup" aria-label="Sluit informatie venster">&times;</button>
    <h2 id="info-title"></h2>
    <div id="info-content"></div>
  </div>

  <script>
    // Clues & descriptions for each suspect
    const suspectInfos = {
      suspect1: {
        basic: "Suspect 1 is a known gambler with debts.",
        clues: [
          { action: "actie1", text: "You discovered Suspect 1 was seen near the crime scene." },
          { action: "actie4", text: "Suspect 1 has a suspicious alibi contradicting witnesses." }
        ]
      },
      suspect2: {
        basic: "Suspect 2 is a former soldier with a short fuse.",
        clues: [
          { action: "actie2", text: "Suspect 2 was arguing loudly minutes before the incident." },
          { action: "actie7", text: "You found a weapon linked to Suspect 2." }
        ]
      },
      suspect3: {
        basic: "Suspect 3 is a local merchant with many secrets.",
        clues: [
          { action: "actie3", text: "Suspect 3 lied about their whereabouts." },
          { action: "actie6", text: "Suspect 3 had unexplained large cash deposits recently." }
        ]
      },
      suspect4: {
        basic: "Suspect 4 is quiet and keeps to themselves.",
        clues: [
          { action: "actie4", text: "Suspect 4 was seen leaving the victim's house." },
          { action: "actie9", text: "Suspect 4 has a hidden criminal record." }
        ]
      },
      suspect5: {
        basic: "Suspect 5 is a local politician with many enemies.",
        clues: [
          { action: "actie5", text: "Suspect 5 was involved in a recent heated debate." },
          { action: "actie10", text: "Suspect 5’s office was ransacked." }
        ]
      },
      suspect6: {
        basic: "Suspect 6 is a mysterious traveler with no clear past.",
        clues: [
          { action: "actie6", text: "Suspect 6 was spotted with strange equipment." },
          { action: "actie12", text: "Suspect 6 has no alibi for the night of murder." }
        ]
      }
    };

    function getStoredActions() {
      try {
        return JSON.parse(localStorage.getItem("actieList")) || [];
      } catch {
        return [];
      }
    }

    const popup = document.getElementById("info-popup");
    const title = document.getElementById("info-title");
    const content = document.getElementById("info-content");
    const closeBtn = document.getElementById("close-popup");

    function displaySuspectInfo(suspectId) {
      const storedActions = getStoredActions();
      const suspect = suspectInfos[suspectId];
      if (!suspect) {
        title.textContent = "Onbekende Verdachte";
        content.innerHTML = "<em>Unknown suspect.</em>";
        openPopup();
        return;
      }

      title.textContent = suspect.basic;

      // Include clues for actions player unlocked/did
      const cluesFound = suspect.clues.filter(c => storedActions.includes(c.action));
      if (cluesFound.length) {
        let listHTML = "<ul>";
        cluesFound.forEach(c => { listHTML += `<li>${c.text}</li>` });
        listHTML += "</ul>";
        content.innerHTML = listHTML;
      } else {
        content.innerHTML = "<em>No clues found yet related to this suspect.</em>";
      }
      openPopup();
    }

    function openPopup() {
      popup.style.display = "block";
      // Focus on close button for accessibility
      closeBtn.focus();
      // Prevent background scroll while popup is open
      document.body.style.overflow = "hidden";
    }

    function closePopup() {
      popup.style.display = "none";
      // Restore scrolling
      document.body.style.overflow = "";
    }

    document.querySelectorAll(".suspect").forEach(el => {
      el.addEventListener("click", () => {
        displaySuspectInfo(el.getAttribute("data-suspect"));
      });

      // Accessibility: allow Enter or Space keypress to activate
      el.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          displaySuspectInfo(el.getAttribute("data-suspect"));
        }
      });
    });

    closeBtn.addEventListener("click", () => {
      closePopup();
    });

    closeBtn.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        closePopup();
      }
    });

    // Close popup when pressing Escape key
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && popup.style.display === "block") {
        closePopup();
      }
    });

    // Optional: Close popup when clicking outside the popup content
    popup.addEventListener("click", (event) => {
      // If click target is the popup background but not child elements
      if (event.target === popup) {
        closePopup();
      }
    });
  </script>
</body>
</html>
