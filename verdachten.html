<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Verdachten</title>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a, #2c1810);
      font-family: Arial, sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1.page-title {
      margin-bottom: 30px;
      font-size: 60px;
      color: gold;
      text-decoration: underline; 
      text-shadow:
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
    }

    .suspects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .suspect {
      cursor: pointer;
      border: 3px solid gold;
      border-radius: 12px;
      padding: 10px;
      background: rgba(50, 50, 50, 0.8);
      transition: transform 0.2s ease;
      user-select: none;
    }

    .suspect:hover, .suspect:focus {
      outline: none;
      transform: scale(1.05);
      border-color: lightgoldenrodyellow;
    }

    .mugshot {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 0 12px 2px gold;
      background: black;
    }

    /* Popup modal styles */
    #info-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      max-width: 600px;
      width: 90%;
      max-height: 400px;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      padding: 20px 30px 20px 20px;
      border-radius: 12px;
      border: 3px solid gold;
      box-shadow: 0 0 20px 4px #ffcc33;
      color: white;
      overflow-y: auto;
      z-index: 10000;
      box-sizing: border-box;
      user-select: text;
    }

    #info-popup h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.8rem;
      color: gold;
      user-select: text;
    }

    #info-popup ul {
      padding-left: 20px;
      margin: 0 0 10px 0;
      text-align: left;
    }

    #info-popup ul li {
      margin-bottom: 0.5rem;
    }

    /* Close button in top right corner */
    #close-popup {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 28px;
      font-weight: bold;
      color: gold;
      cursor: pointer;
      user-select: none;
      padding: 0 6px;
      line-height: 1;
      border-radius: 6px;
      transition: background-color 0.3s ease;
      background: transparent;
      border: none;
    }
    #close-popup:hover, #close-popup:focus {
      background-color: gold;
      color: black;
      outline: none;
    }
    
    .bannerlink {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
    }

    .bannerlink a {
      color: gold;
      font-weight: bold;
      border: 2px solid gold;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .bannerlink a:hover {
      background: gold;
      color: black;
    }
  </style>
</head>
<body>
  <h1 class="page-title">Verdachten</h1>
  <div class="bannerlink">
    <a href="index.html">Main Menu</a>
    <a href="journal.html">Notities</a>
    <a href="event1.html">Events</a>
  </div>

  <div class="suspects-grid">
    <div class="suspect" data-suspect="suspect1" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas11.png" alt="Geeraert Denys" class="mugshot" />
      <strong>Geeraert Denys</strong>
    </div>
    <div class="suspect" data-suspect="suspect2" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas15.png" alt="Beatrijs Penninck" class="mugshot" />
      <strong>Beatrijs Penninck</strong>
    </div>
    <div class="suspect" data-suspect="suspect3" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas6.png" alt="Lodewijk Manskint" class="mugshot" />
      <strong>Lodewijk Manskint</strong>
    </div>
    <div class="suspect" data-suspect="suspect4" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas5.png" alt="Lieven Quadquaet" class="mugshot" />
      <strong>Lieven Quadquaet</strong>
    </div>
    <div class="suspect" data-suspect="suspect5" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/ja.png" alt="Broeder Johannes" class="mugshot" />
      <strong>Broeder Johannes</strong>
    </div>
    <div class="suspect" data-suspect="suspect6" tabindex="0" role="button" aria-pressed="false">
      <img src="https://uploads.onecompiler.io/44fwt7xkt/44kh5bfjr/canvas14.png" alt="Elisabeth de Merseman" class="mugshot" />
      <strong>Elisabeth de Merseman</strong>
    </div>
  </div>

  <!-- Popup box -->
  <div id="info-popup" role="dialog" aria-modal="true" aria-labelledby="info-title" tabindex="-1">
    <button id="close-popup" aria-label="Sluit informatie venster">&times;</button>
    <h2 id="info-title"></h2>
    <div id="info-content"></div>
  </div>

  <script>
    const suspectNames = {
      suspect1: "Geeraert Denys",
      suspect2: "Beatrijs Penninck",
      suspect3: "Lodewijk Manskint",
      suspect4: "Lieven Quadquaet",
      suspect5: "Broeder Johannes",
      suspect6: "Elisabeth de Merseman"
    };

    const suspectInfos = {
      suspect1: {
        basic: "Geeraert Denys, als gildemeester van de wevers, behoort tot de meest kapitaalkrachtige en invloedrijke figuren in Gent. Jaren geleden werd hij door het gerecht verbannen, maar onder druk van bondgenoten en machtige facties liet Van Artevelde hem met tegenzin terugkeren."
      },
      suspect2: {
        basic: "Beatrijs Penninck is een Gentse kunstenares beroemd voor haar heterdoxe stijl. Haar meteorische opgang tot spilfiguur binnen de Gentse elite is ronduit opmerkelijk. Recent deed Willem van Merseman beroep op haar diensten. Specifiek waarvoor is onbekend."
      },
      suspect3: {
        basic: "Lodewijk Manskint is een lokale boef, bijzonder verwant met de stadswacht. Opvallend onderhoudt hij tevens veel contacten met de lokale burgers."
      },
      suspect4: {
        basic: "Lievens Quadquaet is een geapprecieerd lid van de gemeenschap. Men kent hem om zijn gokzucht en om de scheiding van zijn vorige echtgenote, die hem geen erfgenaam wist te schenken."
      },
      suspect5: {
        basic: "Broeder Johannes is ex-professor theologie van Oxford. Niemand weet waarom hij van Engeland is teruggekomen naar Gent. Bekend om zijn stoïcijnse houding, behoudens wanneer ethische vraagstukken ter sprake komen in het Collegium Disputandi."
      },
      suspect6: {
        basic: "Als vooraanstaande dame binnen de hogere klasse, geroemd om haar welsprekendheid, trekken haar herhaalde afwezigheden door buitenlandse reizen des te meer de aandacht."
      }
    };

    // Add your full merged clues (event_actie keys)
    const cluesByActieAllEvents = {
      'event1_actie1': 'Willem Merseman heeft een dolkletsel.',
      'event1_actie2': 'Willem en Elisabeth de Merseman hebben vaak ruzie.',
      'event1_actie3': 'Willem en Geeraert Denys komen niet overeen.',
      'event1_actie4': 'Broeder Johannes komt vaak Willem bezoeken.',
      'event1_actie5': 'Lodewijk Manskint is een misdadiger maar wordt zelden of niet bestraft.',
       // event1
      'event2_actie1': 'Naaktschilderij van Willem de Merseman in het atelier.',
      'event2_actie2': 'Aanboden aan Willem de Merseman van de volder gildemeester.',
      'event2_actie3': 'Roddels dat Willem ontrouw is aan Elisabeth de Merseman.',
      'event2_actie4': 'Een kritische tekst van Broeder Johannes over de celibaatsplicht.',
      'event2_actie5': 'Ongeopende verzoeken tot schuldkwijtschelding van Lievens Quadquaet.',
      'event2_actie6': 'Sierraden van Lokewijk Manskint in de gastkamer.',
      'event2_actie7': 'Geen zichtbare tekenen van verzet.',
      'event2_actie8': 'Kleine bloedspoor - Willem is onmiddelijk gevallen',
      'event2_actie9': 'Elisabeth de Merseman en Willem slapen apart.',
      'event2_actie10': 'Niemand kon binnen of buiten. Dader moet één van de zes verdachten zijn',
      'event2_actie11': 'Dader had slechts enkele seconden om kantoor te verlaten',
      'event2_actie12': 'De messen hier corresponderen niet aan het letsel.',
      // event2
      'event3_actie1': 'Van Artevelde en zijn aanhangers persen de handelaren af. Lievens Quadquaet zit diep in de schulden. Broeder Johannes bezoekt pand Rosenbroek. ',
      'event3_actie2': 'Broeder Johannes heeft grote ambities. Beatrijs Penninck ontkent een relatie te hebben met Willem de Merseman. Lodewijk Manskint was regelmatig bij Willem de Merseman ondanks dat ze elkaar niet konden verdragen',
      'event3_actie3': 'Lodewijk Manskint ontkent banden met Willem de Merseman te hebben. Hij beweert dat Beatrijs Penninck en hem een relatie te hebben. De samenwerking tussen Engeland en de Vlaamse steden veroorzaakt drama. Hij vertrouwt Lievens Quadquaet niet.',
      'event3_actie4': 'Lievens Quadquaet bevestigt sterk bevriend te zijn geweest met Willem. Hij minimaliseert zijn schulden. Hij geeft aan Willem door Broeder Johannes waarschijnlijk in slechte kringen is beland.',
      'event3_actie5': 'Broeder Johannes beweert dat hem en Willem de Merseman uitstekende vrienden waren. Willem zou de laatste tijd bijzonder nerveus zijn geweest. Hij gelooft dat Geeraert Denys een opstand aan het orchestreren is.',
      'event3_actie6': 'Elisabeth de Merseman haat de bastaard Lodewijk Manskint. Ze ontkent dat er problemen waren met Willem buiten zijn nachtelijke activiteiten met Broeder Johannes.',
      // event3
      'event4_actie1': 'Oproep leden wevergilde om zich te bewapenen.',
      'event4_actie2': 'Geruchten dat Beatrijs zich ineens vaak kom biechten.',
      'event4_actie3': 'Dronken beweringen van Lievens Quadquaet dat zijn geldproblemen opgelost zijn.',
      'event4_actie4': 'Vergaderingnotities van Deslager met Edward III in London.',
      'event4_actie5': 'Bevestiging van seksuele diensten aan Broeder Johannes.',
      'event4_actie6': 'Klacht van Elisabeth de Merseman tegen Lodewijk Manskint.',
      'event4_actie7': 'Aanzienlijke bestellingen van Engelse handelaren bij de voldergilde.',
      'event4_actie8': 'Veroordeling tot de dood van Engel Penninck.',
      'event4_actie9': 'Munten vanuit Parijs bij Lievens Quadquaet.',
      'event4_actie10': 'Gratieverlening voor misdrijven van Lodewijk Manskint.',
      'event4_actie11': 'Vulgaire anti-kerk satire geschreven door Broeder Johannes, waarin beatrijs actrice is.',
      'event4_actie12': 'Overplaatsing van Petrus Boomans naar Willem de Merseman.',
      // event4
    'event5_actie1': 'Geeraert Denys beweert Jacob van Artevelde dankbaar te zijn hem een tweede kans te hebben gegeven in Gent. Hij feliciteert de manier waarop de volder gilde werd aangepakt al is het probleem nog niet volledig opgelost.',
    'event5_actie2': 'Beatrijs Penninck vind het verdacht dat Petrus Boomans opeens de nieuwe wachter werd. Ze is recent gelovig geworden na bepaalde traumatische gebeurtenissen.',
    'event5_actie3': 'Lodewijk Manskint denkt dat de dagen van de volders geteld zijn. In hun wanhoop zijn ze gevaarlijk. Misschien hebben zij Willem vermoord.',
    'event5_actie4': 'Lievens Quadquaet bevestigt dat zijn geldproblemen over zijn dankzij zijn nieuwe commercieel projecten rond zout.',
    'event5_actie5': 'Broeder Johannes drukt zich kritisch uit tegenover de kerk en verwijst naar betere praktijken die zich aan het ontwikkelen zijn in Engeland en Duitsland.',
    'event5_actie6': 'Elisabeth de Merseman beweert regelmatig naar Engeland te reizen om haar familie daar te bezoeken.',
    'event5_actie7': 'Geeraert Denys ontkent een opstand te organiseren. Er is wel discussie betreffende fusie tussen verschillende gildes. Hij is niet geschrokken te leren over de contacten van de volders met Engeland.',
    'event5_actie8': 'Beatrijs Penninck bevestigt dat haar broer tot de dood is veroordeeld door Willem de Merseman en zijn aanhangers. Ze beweert. haar plannen voor wraak te achterwege te hebben gelaten nadat ze hem leerde kennen.',
    'event5_actie9': 'Lodewijk Manskint bekent een bastaard te zijn, maar verklapt niet van wie. Hij bevestigt dat de broer van Beatrijs Penninck deel van zijn bende was.',
    'event5_actie10': 'Lievens Quadquaet beweert na zijn echtscheiding naar Frankrijk te zijn vetrokken met zijn nieuwe fiancé.',
    'event5_actie11': 'Broeder Johannes bevestigt dat Willem wist van zijn heretische overtuigingen en dus geen reden had om hem daarom te kwetsen.',
    'event5_actie12': 'Elisabeth de Merseman bevestigt klacht tegen Lodewijk Manskint te hebben ingediend. Zijn aanwezigheid veroorzaakte problemen thuis. Ze vreesde voor haar en haar echtgenoot veiligheid.',
      // event5
    'event6_actie1': 'Dringende oproep bijeenkomst wever en molenaar gildes.',
    'event6_actie2': 'Weelderige verbouwingen bij Jacob van Artevelde.',
    'event6_actie3': 'Schrijven van Broeder Johannes aan lollards over "teologische" bondgenoten.',
    'event6_actie4': 'Afpersing Brouwerij door Handlanger Lodewijk Manskint',
    'event6_actie5': 'Verzameling messen bij Jean Duval.',
    'event6_actie6': 'Doos brieven van Elisabeth de Merseman aan Earl Pembroke.',
    'event6_actie7': 'Operateksten gestuurd van de Graaf van Nevers aan Lievens Quadquaet',
    'event6_actie8': 'Spullen van Lodewijk Manskint bij officieel Mirabello.',
    'event6_actie9': 'Leningen van de Stad Gent aan Edward III.',
    'event6_actie10': 'Brieven omtrent de aankomende excommunicatie van Artevelde.',
    'event6_actie11': 'Faillietverklaring Lakenonderneming Artevelde.',
    'event6_actie12': 'Verslagen Beatrijs Penninck aan Ambassadeur Dietrich Schwarz.',

    };

    const eventKeys = ['event1', 'event2', 'event3', 'event4', 'event5', 'event6'];

    // clues grouped dynamically by suspect
    const cluesBySuspect = {
      suspect1: [],
      suspect2: [],
      suspect3: [],
      suspect4: [],
      suspect5: [],
      suspect6: []
    };

    function getAllUnlockedClueTexts() {
      let clues = [];
      eventKeys.forEach(eventKey => {
        try {
          const unlockedActies = JSON.parse(localStorage.getItem(`actieList_${eventKey}`)) || [];
          unlockedActies.forEach(actieId => {
            const key = `${eventKey}_${actieId}`;
            const clueText = cluesByActieAllEvents[key];
            if (clueText) clues.push(clueText);
          });
        } catch {}
      });
      return clues;
    }
    
    function prefillLocalStorage() {
      if (!localStorage.getItem('actieList_event1')) {
        localStorage.setItem('actieList_event1', JSON.stringify(['actie1', 'actie2']));
      }
      if (!localStorage.getItem('actieList_event2')) {
        localStorage.setItem('actieList_event2', JSON.stringify(['actie1', 'actie3']));
      }
      if (!localStorage.getItem('actieList_event3')) {
        localStorage.setItem('actieList_event3', JSON.stringify(['actie1']));
      }
    }
    prefillLocalStorage();


    function assignCluesToSuspects() {
      const lowerSuspectNames = {};
      Object.entries(suspectNames).forEach(([id, name]) => {
        lowerSuspectNames[id] = name.toLowerCase();
      });

      const allClues = getAllUnlockedClueTexts();

      Object.keys(cluesBySuspect).forEach(id => cluesBySuspect[id] = []);

      allClues.forEach(text => {
        const textLower = text.toLowerCase();
        Object.entries(lowerSuspectNames).forEach(([suspectId, nameLower]) => {
          if (textLower.includes(nameLower)) {
            if (!cluesBySuspect[suspectId].includes(text)) {
              cluesBySuspect[suspectId].push(text);
            }
          }
        });
      });
    }

    // Run once on page load
    assignCluesToSuspects();

    const popup = document.getElementById("info-popup");
    const title = document.getElementById("info-title");
    const content = document.getElementById("info-content");
    const closeBtn = document.getElementById("close-popup");

    function displaySuspectInfo(suspectId) {
      const suspect = suspectInfos[suspectId];
      if (!suspect) {
        title.textContent = "Onbekende Verdachte";
        content.innerHTML = "<em>Unknown suspect.</em>";
        openPopup();
        return;
      }

      title.textContent = suspect.basic;

      const clues = cluesBySuspect[suspectId];
      if (clues && clues.length) {
        content.innerHTML = "<ul>" + clues.map(c => `<li>${c}</li>`).join('') + "</ul>";
      } else {
        content.innerHTML = "<em>Nog geen aanwijzingen gevonden voor deze verdachte.</em>";
      }
      openPopup();
    }

    function openPopup() {
      popup.style.display = "block";
      popup.focus();
      closeBtn.focus();
      document.body.style.overflow = "hidden";
    }

    function closePopup() {
      popup.style.display = "none";
      document.body.style.overflow = "";
    }

    // Suspect event listeners
    document.querySelectorAll(".suspect").forEach(el => {
      el.addEventListener("click", () => {
        displaySuspectInfo(el.dataset.suspect);
      });
      el.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          displaySuspectInfo(el.dataset.suspect);
        }
      });
    });

    // Close handlers
    closeBtn.addEventListener("click", closePopup);
    closeBtn.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        closePopup();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && popup.style.display === "block") {
        closePopup();
      }
    });

    popup.addEventListener("click", (event) => {
      if (event.target === popup) {
        closePopup();
      }
    });
    

  </script>
</body>
</html>
