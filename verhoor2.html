      questionsGrid.style.display = 'none';
    } else {
      continueBtn.classList.add('hidden');
      questionsGrid.style.display = 'grid';
    }
  }

  function appendQAPair(question, answer) {
    const qElem = document.createElement('p');
    qElem.style.fontWeight = '700';
    qElem.style.margin = '0.3rem 0 0.6rem 0';
    qElem.style.color = '#90ee90';
    qElem.textContent = `You: ${question}`;

    const aElem = document.createElement('p');
    aElem.style.margin = '0 0 1rem 0';
    aElem.textContent = answer;

    dialogueWindow.appendChild(qElem);
    dialogueWindow.appendChild(aElem);

    dialogueWindow.scrollTop = dialogueWindow.scrollHeight;
  }

  function renderDialogue(nodeKey, lastQuestion = null) {
    const node = suspectData.dialogueData[nodeKey];
    if (!node) return;

    currentNodeKey = nodeKey;

    answerWindow.textContent = node.text;
    answerWindow.scrollTop = 0;

    if (lastQuestion) {
      appendQAPair(lastQuestion, node.text);
    } else {
      dialogueWindow.innerHTML = '';
      const firstAnswer = document.createElement('p');
      firstAnswer.textContent = node.text;
      dialogueWindow.appendChild(firstAnswer);
    }

    if (diai7Nodes.has(nodeKey) && lastQuestion !== null) {
      questionsAskedFromDiai7.add(lastQuestion);
      updateCounter();
    }

    renderQuestions(node.options || []);
  }

  continueBtn.addEventListener('click', () => {
    // Redirect to Event 3 or another page after interrogation complete
    window.location.href = 'event3.html';
  });

  function initialize() {
    const actieParam = getQueryParam('actie');
    suspectData = suspects[actieParam];

    if (!suspectData) {
      // unknown suspect fallback
      pageTitle.textContent = 'Onbekende Verhoorde';
      characterNameElem.textContent = 'Onbekende';
      characterPortrait.src = '';
      characterPortrait.alt = 'Geen portret beschikbaar';
      answerWindow.textContent = 'Er is geen informatie beschikbaar over deze verdachte.';
      dialogueWindow.textContent = '';
      questionsGrid.innerHTML = '';
      continueBtn.classList.remove('hidden');
      return;
    }

    pageTitle.textContent = `Verhoor: ${suspectData.name}`;
    characterNameElem.textContent = suspectData.name;
    characterPortrait.src = suspectData.portrait;
    characterPortrait.alt = `Portret van ${suspectData.name}`;

    // Start the dialogue at the root node diai1
    renderDialogue('diai1');
  }

  initialize();
</script>
</body>
</html>
